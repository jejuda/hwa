<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>보스 타임 대시보드 - 화순봇</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header>
      <div class="logo-section">
        <h1>🗓️ 화순봇 보탐 대시보드</h1>
        <p>실시간 디스코드 보스 타임 매니저</p>
      </div>
      <div class="status-bar">
        <div class="status-badge">
          <span class="status-dot"></span>
          <span>디스코드 봇 온라인</span>
        </div>
        <div class="status-badge">
          <span class="clock" id="live-clock">00:00:00</span>
        </div>
      </div>
    </header>

    <!-- Quick Actions Panel -->
    <div class="actions-panel">
      <div class="panel-left">
        <!-- 보스 추가 비활성화 -->
      </div>
      <div class="panel-right">
        <span style="font-size: 0.85rem; color: var(--text-secondary); margin-right: 0.5rem;" id="notif-channel-info">
          알림 채널 불러오는 중...
        </span>
      </div>
    </div>

    <!-- Boss Grid -->
    <div class="boss-grid" id="boss-container">
      <!-- Boss Cards will be dynamically inserted here -->
      <div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--text-secondary);">
        보스 목록을 로드하고 있습니다...
      </div>
    </div>
  </div>

  <!-- Add/Edit Boss Modal -->
  <div class="modal-overlay" id="boss-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">보스 등록</h3>
        <button class="modal-close" onclick="closeModal('boss-modal')">&times;</button>
      </div>
      <div class="modal-body">
        <form id="boss-form">
          <input type="hidden" id="form-mode" value="add">
          <input type="hidden" id="original-name">
          <div class="form-group">
            <label for="boss-name-input">보스 이름</label>
            <input type="text" id="boss-name-input" class="form-control" placeholder="예: 가르투아" required>
          </div>
          <div class="form-group">
            <label for="boss-cooldown-input">젠 주기 (시간 단위)</label>
            <input type="number" id="boss-cooldown-input" class="form-control" placeholder="예: 4 또는 0.5" step="any" min="0.01" required>
          </div>
          <div class="form-group">
            <label for="boss-memo-input">메모</label>
            <input type="text" id="boss-memo-input" class="form-control" placeholder="예: 3층 구석">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('boss-modal')">취소</button>
        <button class="btn btn-primary" id="btn-submit-boss">저장</button>
      </div>
    </div>
  </div>

  <!-- Custom Cut Modal -->
  <div class="modal-overlay" id="cut-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>처치(컷) 기록 설정</h3>
        <button class="modal-close" onclick="closeModal('cut-modal')">&times;</button>
      </div>
      <div class="modal-body">
        <form id="cut-form">
          <input type="hidden" id="cut-boss-name">
          <div class="form-group">
            <label for="cut-time-input">처치 시각 (생략하면 현재 시간)</label>
            <input type="text" id="cut-time-input" class="form-control" placeholder="예: 14:30, 10분전, 10">
            <span style="display: block; font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.35rem;">
              * 빈칸 시 즉시 컷 처리됩니다. '14:30'처럼 절대 시각을 적거나 '10' 혹은 '10분전'으로 기입할 수 있습니다.
            </span>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('cut-modal')">취소</button>
        <button class="btn btn-danger" id="btn-submit-cut">처치 기록</button>
      </div>
    </div>
  </div>

  <!-- Set Next Spawn Modal -->
  <div class="modal-overlay" id="spawn-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>다음 젠 예정 시간 강제 지정</h3>
        <button class="modal-close" onclick="closeModal('spawn-modal')">&times;</button>
      </div>
      <div class="modal-body">
        <form id="spawn-form">
          <input type="hidden" id="spawn-boss-name">
          <div class="form-group">
            <label for="spawn-time-input">다음 젠 예정 시각 (필수)</label>
            <input type="text" id="spawn-time-input" class="form-control" placeholder="예: 18:45" required>
            <span style="display: block; font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.35rem;">
              * '18:45' 형태로 젠 시간을 직접 강제 고정합니다. (만약 현재 시각보다 과거 시간인 경우 내일 젠으로 자동 처리됩니다.)
            </span>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('spawn-modal')">취소</button>
        <button class="btn btn-success" id="btn-submit-spawn">젠 예정 시간 지정</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
